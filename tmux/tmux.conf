# -----------------------------
# Modern tmux.conf (2026) - FULLY COMMENTED EDITION
# !!! AI generated !!!!
# -----------------------------
# This configuration is designed to be:
# - Developer-friendly (vim-style navigation)
# - Modern (true color, plugins, theming)
# - Persistent (sessions auto-save/restore)
# - Fast and ergonomic
#
# REQUIREMENTS:
# - tmux >= 3.2
# - git
# - bash/zsh
# - TPM (Tmux Plugin Manager)
#
# Install TPM:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then inside tmux:
#   prefix + I   -> install plugins
#   prefix + U   -> update plugins
# -----------------------------

##### GENERAL SETTINGS #####

# Use modern terminal with true color support
set -g default-terminal "tmux-256color"

# Enable RGB color support for compatible terminals
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support (pane resize, selection, switching)
set -g mouse on

# Increase scrollback buffer (very useful for logs/debugging)
set -g history-limit 100000

# Allow applications (like vim) to receive focus events
set -g focus-events on

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Start window numbering at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Prevent programs from renaming tmux windows automatically
set -g allow-rename off

##### PREFIX KEY #####

# Default prefix (Ctrl+b) is awkward → switch to Ctrl+a (like GNU screen)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

##### SPLIT WINDOWS #####

# Use intuitive keys for splitting panes
bind | split-window -h     # vertical split
bind - split-window -v     # horizontal split

# Remove default bindings
unbind '"'
unbind %

##### PANE NAVIGATION (VIM STYLE) #####

# Move between panes using hjkl (like vim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### PANE RESIZING #####

# Resize panes using Shift + hjkl (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### COPY MODE (VIM STYLE) #####

# Use vim-style keybindings in copy mode
setw -g mode-keys vi

# Start selection with 'v'
bind-key -T copy-mode-vi v send -X begin-selection

# Copy selection with 'y' and exit copy mode
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Toggle rectangle selection (block select)
bind-key -T copy-mode-vi r send -X rectangle-toggle

##### SYSTEM CLIPBOARD #####

# Automatically copy to system clipboard (works with plugins like tmux-yank)
set -g set-clipboard on

##### STATUS BAR #####

# Move status bar to top (modern preference)
set -g status-position top

# Refresh interval (seconds)
set -g status-interval 5

# Colors (Catppuccin-friendly palette)
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Length limits
set -g status-left-length 50
set -g status-right-length 150

# Left side: session name
set -g status-left "#[fg=#89b4fa]#S #[fg=#6c7086]|"

# Right side: date, time, user
set -g status-right "#[fg=#a6e3a1]%Y-%m-%d #[fg=#89b4fa]%H:%M #[fg=#6c7086]| #[fg=#f38ba8]#(whoami)"

##### WINDOW TABS #####

# Inactive window format
setw -g window-status-format "#[fg=#6c7086]#I:#W"

# Active window format
setw -g window-status-current-format "#[fg=#a6e3a1,bold]#I:#W"

##### PERFORMANCE TWEAKS #####

# Remove delay after pressing ESC (important for vim users)
set -sg escape-time 0

# Time tmux waits for repeated key presses
set -g repeat-time 600

##### PLUGIN MANAGEMENT (TPM) #####

# Initialize TPM
set -g @plugin 'tmux-plugins/tpm'

# Sensible defaults (recommended baseline config)
set -g @plugin 'tmux-plugins/tmux-sensible'

# Show indicator when prefix key is pressed
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Copy/yank text to system clipboard easily
set -g @plugin 'tmux-plugins/tmux-yank'

# Save/restore tmux sessions manually
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Automatically save & restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Show CPU, RAM usage in status bar
set -g @plugin 'tmux-plugins/tmux-cpu'

# Modern theme (Catppuccin)
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha'

# Fuzzy finder integration (session/window switching)
set -g @plugin 'sainnhe/tmux-fzf'

# Open URLs from terminal
set -g @plugin 'tmux-plugins/tmux-open'

# Smart session switcher (project-based workflows)
set -g @plugin 'joshmedeski/tmux-sessionizer'

##### CATPPUCCIN THEME CUSTOMIZATION #####

# Rounded window tabs
set -g @catppuccin_window_status_style "rounded"

# Transparent background (better with terminal themes)
set -g @catppuccin_status_background "default"

##### KEYBINDINGS #####

# Reload config without restarting tmux
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Launch sessionizer (project/session picker)
bind s run-shell "~/.tmux/plugins/tmux-sessionizer/scripts/sessionizer.sh"

# Quickly edit config
bind e new-window "$EDITOR ~/.tmux.conf"

##### OPTIONAL DEV ENHANCEMENTS #####

# Better pane border visibility
set -g pane-border-style "fg=#6c7086"
set -g pane-active-border-style "fg=#89b4fa"

# Automatically set window title to current command
setw -g automatic-rename on

##### START TPM (MUST BE LAST LINE) #####
run '~/.tmux/plugins/tpm/tpm'

##### NEOVIM + TMUX SEAMLESS NAVIGATION #####

# This enables seamless navigation between tmux panes and Neovim splits
# using the same keybindings (Ctrl + h/j/k/l).
#
# REQUIREMENT (Neovim side):
# Install plugin in Neovim config (init.lua or plugins):
#   'christoomey/vim-tmux-navigator'
#
# Example (lazy.nvim):
#   { "christoomey/vim-tmux-navigator" }
#
# Without this plugin in Neovim, navigation will NOT cross boundaries.

# Smart pane switching (works with vim/nvim splits)
bind -n C-h run-shell "tmux select-pane -L || tmux send-keys C-h"
bind -n C-j run-shell "tmux select-pane -D || tmux send-keys C-j"
bind -n C-k run-shell "tmux select-pane -U || tmux send-keys C-k"
bind -n C-l run-shell "tmux select-pane -R || tmux send-keys C-l"

# Faster switching without delay
set -g @vim_navigator_mapping_left "C-h"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_right "C-l"

# Optional: prevent conflicts with Neovim terminal mode
# (uncomment if you notice issues)
# set -g @vim_navigator_disable_when_zoomed 1

##### OPTIONAL: COPY MODE WITH SYSTEM CLIPBOARD (NEOVIM FRIENDLY) #####

# Ensures copied text is available in Neovim and system clipboard
# Requires: xclip (X11) or wl-copy (Wayland)

set -g @yank_selection_mouse 'clipboard'

##### START TPM (MUST BE LAST LINE) #####
run '~/.tmux/plugins/tpm/tpm'

# -----------------------------
# END OF CONFIG
# -----------------------------

